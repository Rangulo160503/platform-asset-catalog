asset:
  ## Name of the asset - same as name of file and same as prefix of terra-live repository
  ## (Required)
  name: retail-billing

  ## Global Metadata of the asset
  ## (Required)
  globalMetadata:
    ## Name of the default lob from https://docs.google.com/spreadsheets/d/1o7Oy9Wv5ATXiwpkx5BZbxyXDRXEKQn9zNaNPc6iDI2M
    ## (Required)
    lob: tech_dev_br_retailer_billing

    ## name of scrum team from the same document second sheet
    ## (Required)
    scrumTeam: team_retail_billing

    ## name of applications group, required but not defined yet on company level,
    ## recommended same as asset name
    ## (Required)
    applicationGroup: retail-billing

  ## Additional Metadata of the asset
  ## (Optional)
  metadata:
    ## ID of primary JIRA project
    ## (Optional)
    jiraProjectId: BILL

    ## id of github team, starts with coretech
    ## (Optional)
    githubTeamId: coretech/boss-retail-billing

    ## Name of primary Slack channel
    ## (Optional)
    teamSlackChannel: team_retail_billing

    ## Primary responsible person for created resources
    ## (Optional)
    resourceOwner: boss-retail-billing@idt.net

  ## Busineess owners
  ## (Required)
  owners:
    ## List of Stakeholders
    ## (Required)
    stakeholders:
      - joshua.hartman@idt.net
    ## List of Product Owners
    ## (Required)
    productOwners:
      - ravinder.saggar@idt.net
    ## List of Technical Experts
    ## (Required)
    technicalExperts:
      - alex.zavadsky@idt.net

  ## Map of Users, who will have access to created resources, Vault secrets, Jenkins jobs
  ## (Required)
  users:
    ## List of Asset Administrators. Each memeber will have full access to all environments.
    ## Expected to have Tech Lead/Senior Developer, DevOps, Manager/Director role.
    ## (Required)
    admins:
      ## Each defined user should have same configuration
      ## (Required)
      - email: alex.zavadsky@idt.net
        githubUsername: AlexandrZavadsky
        ldapUid: azavadsky
      - email: victoria.zakharova@idt.net
        githubUsername: victoriazakharo
        ldapUid: vzakharova
      - email: viktor.chalyi@idt.net
        githubUsername: vchalyi
        ldapUid: vchalyi
      - email: anton.tarasevich@idt.net
        githubUsername: antarasevich
        ldapUid: antarasevich
      - email: mikita.manko@idt.net
        githubUsername: mikita-manko-idt
        ldapUid: mmanko

    ## List of Asset Maintainers. Each member will have read access to Production and read/write access to Non-Production(UAT, QA, Development, Lab) environments.
    ## Expected to be QA Engineer. Can be empty(~)
    ## (Optional) Defaults ~
    maintainers:
      - email: ravinder.saggar@idt.net
        ldapUid: rsaggar
      - email: lourdes.villca@idt.net
        githubUsername: LourdesVillca01
        ldapUid: lvillca
      - email: darya.barkova@idt.net
        githubUsername: dariabarkova
        ldapUid: dbarkova

    ## List of Asset Developers. Each memeber will have read access to QA, UAT environment and read/write access to Development, Lab environment.
    ## Expected to be Software Engineers/Developers. Can be empty(~)
    ## (Optional) Defaults ~
    developers: ~

  ## Map of AWS Environments. Terra-Live environments can be created on specified list of environments/AWS accounts.
  ## (Required)
  environments:
    ## Environment name ([a-z0-9-]+)
    ## (Required)
    dev:
      ## Environment type, one of 'lab', 'dev', 'qa', 'uat', 'prod'
      ## (Required)
      envType: dev
      ## AWS account ID
      ## (Required)
      accountId: 833915412828
      ## If changes to child stack can be hidden on change to parent stack.
      ## (Optional) Defaults false
      protected: false
      ## Name of the VPC
      ## (Optional) Defaults "generic"
      vpcName: generic
    qa:
      envType: qa
      accountId: 470427355418
      protected: false
      vpcName: generic
    qa-rc:
      envType: qa
      accountId: 470427355418
      protected: false
      vpcName: generic
    uat:
      envType: uat
      accountId: 412304547329
      protected: false
      vpcName: generic
    prod:
      envType: prod
      accountId: 412304547329
      protected: true
      vpcName: generic
