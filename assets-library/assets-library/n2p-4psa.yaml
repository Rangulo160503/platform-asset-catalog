        githubUsername: jpaz
        ldapUid: jpaz
      - email: santiago.romero@net2phone.com
        githubUsername: sromero
        ldapUid: sromero
      - email: eric.frisch@idt.net
        githubUsername: erisch
        ldapUid: efrisch
      - email: douglas.arana@idt.net
        githubUsername: darana
