asset:
  ## Name of the asset - same as name of file and same as prefix of terra-live repository
  ## (Required)
  name: car-route

  ## Global Metadata of the asset
  ## (Required)
  globalMetadata:
    ## Name of the default lob from https://docs.google.com/spreadsheets/d/1o7Oy9Wv5ATXiwpkx5BZbxyXDRXEKQn9zNaNPc6iDI2M
    ## (Required)
    lob: tech_dev_wholesale

    ## name of scrum team from the same document second sheet
    ## (Required)
    scrumTeam: carrier-routing

    ## name of applications group, required but not defined yet on company level,
    ## recommended same as asset name
    ## (Required)
    applicationGroup: car-route

  ## Additional Metadata of the asset
  ## (Optional)
  metadata:
    ## ID of primary JIRA project
    ## (Optional)
    jiraProjectId: CARRIERQUEUE

    ## id of github team, starts with @coretech
    ## (Optional)
    githubTeamId: coretech/carrier-routing

    ## Name of primary Slack channel
    ## (Optional)
    teamSlackChannel: team_carrier_routing

    ## Primary responsible person for created resources
    ## (Optional)
    resourceOwner: carrier-routing@idt.net

  ## Busineess owners
  ## (Required)
  owners:
    ## List of Stakeholders
    ## (Required)
    stakeholders:
      - anthony.davidson@idt.net
    ## List of Product Owners
    ## (Required)
    productOwners:
      - anthony.davidson@idt.net
    ## List of Technical Experts
    ## (Required)
    technicalExperts:
      - inna.golovchtchikova@idt.net
      - alexander.sheleh@idt.net
      - alexander.kovalev@idt.net

  ## Map of Users, who will have access to created resources, Vault secrets, Jenkins jobs
  ## (Required)
  users:
    ## List of Asset Administrators. Each memeber will have full access to all environments.
    ## Expected to have Tech Lead/Senior Developer, DevOps, Manager/Director role.
    ## (Required)
    admins:
      ## Each defined user should have same configuration
      ## (Required)
      -  ## Email address, ends with @idt.net
        ##  (Required)
        email: manan.patel@idt.net
        ## GitHub user id(login)
        ## (Required)
        githubUsername: manpatel
        ## LDAP user ID, typically first letter of the first name + last name
        ## (Required)
        ldapUid: mpatel
      - ##  Email address, ends with @idt.net
        ##  (Required)
        email: inna.golovchtchikova@idt.net
        ## GitHub user id(login)
        ## (Required)
        githubUsername: igolov
        ## LDAP user ID, typically first letter of the first name + last name
        ## (Required)
        ldapUid: igolovchtchikova
      - ##  Email address, ends with @idt.net
        ##  (Required)
        email: alexander.sheleh@idt.net
        ## GitHub user id(login)
        ## (Required)
        githubUsername: alexander-sheleh
        ## LDAP user ID, typically first letter of the first name + last name
        ## (Required)
        ldapUid: asheleh
      - ##  Email address, ends with @idt.net
        ##  (Required)
        email: alexandr.sohonevich@idt.net
        ## GitHub user id(login)
        ## (Required)
        githubUsername: asohonevich
        ## LDAP user ID, typically first letter of the first name + last name
        ## (Required)
        ldapUid: asohonevich


    ## List of Asset Maintainers. Each memeber will have read access to Production and read/write access to Non-Production(UAT, QA, Development, Lab) environments.
    ## Expected to be QA Engineer. Can be empty(~)
    ## (Optional) Defaults ~
    maintainers:
      - ##  Email address, ends with @idt.net
        ##  (Required)
        email: natallia.klemiata@idt.net
        ## GitHub user id(login)
        ## (Required)
        githubUsername: nklemiata-idt
        ## LDAP user ID, typically first letter of the first name + last name
        ## (Required)
        ldapUid: nklemiata

    ## List of Asset Developers. Each memeber will have read access to QA, UAT environment and read/write access to Development, Lab environment.
    ## Expected to be Software Engineers/Developers. Can be empty(~)
    ## (Optional) Defaults ~
    ## test PR
    developers: ~


  ## Map of AWS Environments. Terra-Live environments can be created on specified list of environments/AWS accounts.
  ## (Required)
  environments:
    ## Environment name ([a-z0-9-]+)
    ## (Required)
    sand:
      envType: dev
      accountId: 312226949769
      protected: false
      vpcName: generic
      vaultSupport: true
      allowApplyInParallelWithOtherEnvironments: false
    sand-v2:
      envType: dev
      accountId: 312226949769
      protected: false
      vpcName: generic
      vaultSupport: true
      allowApplyInParallelWithOtherEnvironments: false

    qa:
      envType: qa
      accountId: 470427355418
      protected: false
      vpcName: generic
      vaultSupport: true
      allowApplyInParallelWithOtherEnvironments: false
    qa-v2:
      envType: qa
      accountId: 470427355418
      protected: false
      vpcName: generic
      vaultSupport: true
      allowApplyInParallelWithOtherEnvironments: false

    production:
      envType: prod
      accountId: 412304547329
      protected: true
      vpcName: generic
      vaultSupport: true
      allowApplyInParallelWithOtherEnvironments: false
    prod-v2:
      envType: prod
      accountId: 412304547329
      protected: true
      vpcName: generic
      vaultSupport: true
      allowApplyInParallelWithOtherEnvironments: false
