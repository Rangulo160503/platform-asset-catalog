    developers: ~

  ## Map of AWS Environments. Terra-Live environments can be created on specified list of environments/AWS accounts.
  ## (Required)
  environments:
    dev:
      ## Environment type, one of 'lab', 'dev', 'qa', 'uat', 'prod'
      ## (Required)
      envType: dev
      ## AWS account ID
      ## (Required)
      accountId: 833915412828
      ## If changes to child stack can be hidden on change to parent stack.
      ## (Optional) Defaults false
      protected: false
      ## Name of the VPC
      ## (Optional) Defaults "generic"
      vpcName: generic

    qa:
      ## Environment type, one of 'lab', 'dev', 'qa', 'uat', 'prod'
      ## (Required)
      envType: qa
      ## AWS account ID
      ## (Required)
      accountId: 470427355418
      ## If changes to child stack can be hidden on change to parent stack.
      ## (Optional) Defaults false
      protected: false
      ## Name of the VPC
      ## (Optional) Defaults "generic"
      vpcName: generic

    uat:
      ## Environment type, one of 'lab', 'dev', 'qa', 'uat', 'prod'
      ## (Required)
      envType: uat
      ## AWS account ID
      ## (Required)
      accountId: 412304547329
      ## If changes to child stack can be hidden on change to parent stack.
      ## (Optional) Defaults false
      protected: false
      ## Name of the VPC
      ## (Optional) Defaults "generic"
      vpcName: generic

    prod:
      ## Environment type, one of 'lab', 'dev', 'qa', 'uat', 'prod'
      ## (Required)
      envType: prod
      ## AWS account ID
      ## (Required)
      accountId: 412304547329
      ## If changes to child stack can be hidden on change to parent stack.
      ## (Optional) Defaults false
      protected: false
      ## Name of the VPC
      ## (Optional) Defaults "generic"
      vpcName: generic
